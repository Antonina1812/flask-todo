name: CI/CD Pipeline

on:
  push:
    branches: [ main ]      # при пуше в ветку main
  pull_request:
    branches: [ main ]      # при создании PR в main

env:
  IMAGE_NAME: flask-todo
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  
  test:
    runs-on: ubuntu-latest          # виртуальная машина GitHub
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v3
        
      - name: Установить Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Установить зависимости
        run: pip install -r requirements.txt
        
      - name: Запустить тесты
        run: pytest -v
        # Тесты используют SQLite в памяти — не нужен PostgreSQL!

  build:
    needs: test                     # запускать ТОЛЬКО после успешного test
    runs-on: ubuntu-latest
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v3
        
      - name: Залогиниться в Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Собрать и запушить образ
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-todo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-todo:${{ github.sha }}

  deploy:
    needs: build                    # запускать после build
    runs-on: ubuntu-latest
    
    steps:
      - name: Деплой на сервер
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/flask-todo
            docker compose pull app
            docker compose up -d --no-deps app
            docker image prune -f